services:
  backend:
    build: ./server
    container_name: briefly_backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env

  frontend:
    build: ./frontend
    container_name: briefly_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - BETTER_AUTH_URL=http://localhost:3000
    depends_on:
      - backend